name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Desktop: macOS ───────────────────────────────────────────────────────────
  release-macos:
    name: Release macOS
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workdir: clients/desktop/src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            clients/web/package-lock.json
            clients/desktop/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefix clients/web
          npm ci --prefix clients/desktop

      - name: Build desktop app
        run: npm run build
        working-directory: clients/desktop

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: clients/desktop/src-tauri/target/release/bundle/dmg/*.dmg

  # ── Desktop: Windows ────────────────────────────────────────────────────────
  release-windows:
    name: Release Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workdir: clients/desktop/src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            clients/web/package-lock.json
            clients/desktop/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefix clients/web
          npm ci --prefix clients/desktop

      - name: Build desktop app
        run: npm run build
        working-directory: clients/desktop

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            clients/desktop/src-tauri/target/release/bundle/msi/*.msi
            clients/desktop/src-tauri/target/release/bundle/nsis/*.exe

  # ── Desktop: Linux (Signed) ───────────────────────────────────────────────────
  release-linux:
    name: Release Linux
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm \
            gnupg

      - name: Import GPG key for signing
        if: ${{ vars.GPG_KEY_ID != '' }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "GPG key imported successfully"

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workdir: clients/desktop/src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            clients/web/package-lock.json
            clients/desktop/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefix clients/web
          npm ci --prefix clients/desktop

      - name: Build desktop app
        run: npm run build
        working-directory: clients/desktop

      - name: Sign Linux packages
        if: ${{ vars.GPG_KEY_ID != '' }}
        env:
          GPG_KEY_ID: ${{ vars.GPG_KEY_ID }}
        run: |
          cd clients/desktop/src-tauri/target/release/bundle

          # Sign .deb package (detached GPG signature)
          for deb in deb/*.deb; do
            echo "Signing $deb..."
            gpg --batch --yes --detach-sign --armor -u "$GPG_KEY_ID" "$deb"
          done

          # Sign .rpm package (detached GPG signature — rpm --addsign
          # requires %_gpg_name macro which is unreliable on CI runners)
          for rpm_file in rpm/*.rpm; do
            echo "Signing $rpm_file..."
            gpg --batch --yes --detach-sign --armor -u "$GPG_KEY_ID" "$rpm_file"
          done

          # Create detached signature for AppImage
          for appimage in appimage/*.AppImage; do
            echo "Signing $appimage..."
            gpg --batch --yes --detach-sign --armor -u "$GPG_KEY_ID" "$appimage"
          done

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            clients/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            clients/desktop/src-tauri/target/release/bundle/appimage/*.AppImage.asc
            clients/desktop/src-tauri/target/release/bundle/deb/*.deb
            clients/desktop/src-tauri/target/release/bundle/deb/*.deb.asc
            clients/desktop/src-tauri/target/release/bundle/rpm/*.rpm
            clients/desktop/src-tauri/target/release/bundle/rpm/*.rpm.asc

  # ── Android APK (Signed) ─────────────────────────────────────────────────────
  release-android:
    name: Release Android APK
    runs-on: ubuntu-latest
    env:
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workdir: clients/desktop/src-tauri

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK 27
        run: echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            clients/web/package-lock.json
            clients/desktop/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefix clients/web
          npm ci --prefix clients/desktop

      - name: Build web frontend
        run: npm run build
        working-directory: clients/web

      - name: Link Tauri CLI for Android Gradle build
        run: ln -sf ../node_modules/@tauri-apps/cli/tauri.js clients/desktop/src-tauri/tauri

      - name: Decode Android keystore
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > /tmp/keystore.jks

      - name: Build Android APK
        env:
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.0.12077973
          TAURI_SIGNING_STORE_PATH: ${{ env.HAS_KEYSTORE == 'true' && '/tmp/keystore.jks' || '' }}
          TAURI_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          TAURI_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          TAURI_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd clients/desktop
          ./node_modules/.bin/tauri android build --apk

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: clients/desktop/src-tauri/gen/android/app/build/outputs/apk/**/*.apk

  # ── Publish GitHub Release ───────────────────────────────────────────────────
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [release-macos, release-windows, release-linux, release-android]
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Check if packages are signed
        id: signing-check
        run: |
          # Check if signature files exist (indicates signing was enabled)
          if ls artifacts/*.AppImage.asc 1> /dev/null 2>&1; then
            echo "linux_signed=true" >> $GITHUB_OUTPUT
          else
            echo "linux_signed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          prerelease: true
          generate_release_notes: true
          body: |
            ## Together — Pre-release

            Connect to your own self-hosted Together server. See the [self-hosting guide](https://github.com/jtjenkins/Together/blob/main/docs/self-hosting.md).

            | Platform | File | Notes |
            |---|---|---|
            | macOS (Apple Silicon) | `.dmg` | ${{ steps.signing-check.outputs.linux_signed == 'true' && '⚠️ Unsigned: Right-click → Open → "Open Anyway"' || '⚠️ Unsigned: Right-click → Open → "Open Anyway"' }} |
            | Windows | `.msi` (recommended) or `.exe` | ⚠️ Unsigned: Click "More info" → "Run anyway" |
            | Linux | `.AppImage`, `.deb`, or `.rpm` | ${{ steps.signing-check.outputs.linux_signed == 'true' && '✅ GPG signed' || '⚠️ Unsigned' }} |
            | Android | `.apk` | ${{ secrets.ANDROID_KEYSTORE != '' && '✅ Signed - can be uploaded to Play Store' || '⚠️ Unsigned - for testing only' }} |

            ### Installation notes

            **macOS:** Right-click the `.dmg` → Open → "Open Anyway" to bypass Gatekeeper.

            **Windows:** If SmartScreen appears, click "More info" → "Run anyway".

            **Linux:** 
            - **AppImage:** Make executable (`chmod +x`), then run
            - **.deb:** Install with `sudo dpkg -i` or `sudo apt install`
            - **.rpm:** Install with `sudo rpm -i` or `sudo dnf install`

            **Android:** Enable "Install unknown apps" in settings, then open the `.apk`.

            **iOS:** Not available yet — requires App Store signing. Coming in a future release.

            ### Verifying Linux signatures

            If you downloaded a signed release:

            ```bash
            # Import the signing key (do this once)
            curl -fsSL https://raw.githubusercontent.com/jtjenkins/Together/main/docs/together-signing-public.asc | gpg --import

            # Verify AppImage
            gpg --verify Together-*.AppImage.asc

            # Verify .deb
            gpg --verify together_*.deb.asc together_*.deb

            # Verify .rpm
            gpg --verify together-*.rpm.asc together-*.rpm
            ```
