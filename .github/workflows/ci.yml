name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: "0"

jobs:
  # ── Check & Lint ────────────────────────────────────────────────────────────
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      # Use checked-in .sqlx query metadata — no live DB needed at compile time.
      SQLX_OFFLINE: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "server -> target"

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

  # ── Build & Test ────────────────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: together
          POSTGRES_PASSWORD: together_dev_password
          POSTGRES_DB: together_dev
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://together:together_dev_password@localhost:5432/together_dev
      JWT_SECRET: ci-test-secret-min-32-characters-long!!

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "server -> target"

      # Cache the compiled sqlx-cli binary. Bump the version suffix when
      # upgrading sqlx (currently 0.8). The cache is keyed per OS.
      - name: Cache sqlx-cli
        id: cache-sqlx
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/sqlx
          key: sqlx-cli-v0.8-${{ runner.os }}

      - name: Install sqlx-cli
        if: steps.cache-sqlx.outputs.cache-hit != 'true'
        run: |
          cargo install sqlx-cli \
            --no-default-features \
            --features postgres,native-tls \
            --locked

      - name: Run database migrations
        run: sqlx migrate run

      - name: Build
        run: cargo build --locked

      - name: Test
        run: cargo test --locked

      # Upload the debug binary so the e2e job can reuse it without recompiling.
      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: server-binary
          path: target/debug/together-server
          retention-days: 1

  # ── OpenAPI Spec Drift Check ─────────────────────────────────────────────────
  openapi-check:
    name: OpenAPI Spec Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "server -> target"

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Build
        run: cargo build --locked

      - name: Check OpenAPI spec is up to date
        run: |
          TMPFILE=$(mktemp /tmp/openapi-generated.XXXXXX.json)
          trap 'rm -f "$TMPFILE"' EXIT
          ./target/debug/together-server --dump-openapi > "$TMPFILE"
          if ! diff -q \
              <(jq --sort-keys . "$TMPFILE") \
              <(jq --sort-keys . ../docs/openapi.json) \
              > /dev/null 2>&1; then
            echo ""
            echo "ERROR: docs/openapi.json is out of date."
            echo "Run: ./scripts/generate-openapi.sh"
            exit 1
          fi
          echo "docs/openapi.json is up to date."

  # ── Security Audit ──────────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    # Non-blocking while the project is young — surfaces advisories without
    # failing the pipeline. Set continue-on-error: false once audit is clean.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "server -> target"

      - name: Cache cargo-audit
        id: cache-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}

      - name: Install cargo-audit
        if: steps.cache-audit.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked

      - name: Audit dependencies
        run: cargo audit

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run npm audit (web)
        run: npm audit --audit-level=high
        working-directory: clients/web

      - name: Run npm audit (desktop)
        run: npm audit --audit-level=high
        working-directory: clients/desktop

  # ── Docs: Build ────────────────────────────────────────────────────────────
  docs-build:
    name: Docs Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs/site

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Copy OpenAPI specs
        run: |
          cp ../../docs/openapi.yaml docs/public/openapi.yaml
          cp ../../docs/openapi.json docs/public/openapi.json

      - name: Build docs site
        run: npx vitepress build

  # ── Web UI: Lint, Typecheck & Tests ───────────────────────────────────────
  # Combining lint and test in one job avoids a second `npm ci` and runner
  # spin-up. Both previously ran on the same package-lock.json anyway.
  web-validate:
    name: Web UI Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: clients/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

  # ── Web UI: Build ──────────────────────────────────────────────────────────
  web-build:
    name: Web UI Build
    runs-on: ubuntu-latest
    needs: [web-validate]
    defaults:
      run:
        working-directory: clients/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: clients/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Upload the compiled frontend so downstream jobs (desktop, mobile) can
      # reuse it instead of rebuilding.
      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: clients/web/dist
          retention-days: 1

  # ── Desktop App: Build ─────────────────────────────────────────────────────
  desktop-build:
    name: Desktop Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [web-build]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "clients/desktop/src-tauri -> target"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: clients/desktop/package-lock.json

      # Download the pre-built web frontend so Tauri bundles it without
      # recompiling. The beforeBuildCommand in tauri.conf.json is then cleared
      # to prevent a redundant npm run build inside the Tauri CLI.
      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: clients/web/dist

      - name: Skip web rebuild in Tauri config (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          jq '.build.beforeBuildCommand = ""' \
            clients/desktop/src-tauri/tauri.conf.json \
            > /tmp/tauri.conf.json
          mv /tmp/tauri.conf.json clients/desktop/src-tauri/tauri.conf.json

      - name: Skip web rebuild in Tauri config (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cfg = Get-Content clients/desktop/src-tauri/tauri.conf.json | ConvertFrom-Json
          $cfg.build.beforeBuildCommand = ""
          $cfg | ConvertTo-Json -Depth 10 | Set-Content clients/desktop/src-tauri/tauri.conf.json

      - name: Install desktop dependencies
        run: npm ci
        working-directory: clients/desktop

      - name: Build desktop app
        run: npm run build
        working-directory: clients/desktop

  # ── Desktop App: Build (Arch Linux) ────────────────────────────────────────
  desktop-build-arch:
    name: Desktop Build (Arch Linux)
    runs-on: ubuntu-latest
    needs: [web-build]
    env:
      # The Actions runner sets HOME=/github/home but the container runs as
      # root (HOME=/root). rustup and cargo-cache both fail when these differ.
      HOME: /root
    container:
      image: archlinux:latest

    steps:
      # git must exist before actions/checkout can clone the repo
      - name: Install git and base tools
        run: pacman -Syu --noconfirm git base-devel curl jq

      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          pacman -S --noconfirm \
            webkit2gtk-4.1 \
            libappindicator-gtk3 \
            librsvg \
            patchelf \
            nodejs \
            npm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "clients/desktop/src-tauri -> target"

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: clients/web/dist

      - name: Skip web rebuild in Tauri config
        run: |
          jq '.build.beforeBuildCommand = ""' \
            clients/desktop/src-tauri/tauri.conf.json \
            > /tmp/tauri.conf.json
          mv /tmp/tauri.conf.json clients/desktop/src-tauri/tauri.conf.json

      - name: Install desktop dependencies
        run: npm ci
        working-directory: clients/desktop

      - name: Build desktop app
        # --no-bundle: AppImage creation requires FUSE which is unavailable in
        # Docker containers. The binary still compiles and links correctly;
        # Arch packaging is handled via AUR rather than a CI bundle artifact.
        run: npm run build -- --no-bundle
        working-directory: clients/desktop

  # ── Mobile App: Tauri Android Build ────────────────────────────────────────
  mobile-tauri-android:
    name: Mobile Android Build (Tauri)
    runs-on: ubuntu-latest
    needs: [web-build]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "clients/desktop/src-tauri -> target"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK 27
        run: echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: clients/desktop/package-lock.json

      - name: Install desktop dependencies
        run: npm ci --prefix clients/desktop

      # Download the pre-built web frontend. This avoids both running npm ci
      # for the web client and the double-build caused by beforeBuildCommand
      # running again inside tauri android build.
      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: clients/web/dist

      - name: Skip web rebuild in Tauri config
        run: |
          jq '.build.beforeBuildCommand = ""' \
            clients/desktop/src-tauri/tauri.conf.json \
            > /tmp/tauri.conf.json
          mv /tmp/tauri.conf.json clients/desktop/src-tauri/tauri.conf.json

      - name: Link Tauri CLI for Android Gradle build
        # Gradle calls `node tauri android android-studio-script` from src-tauri/.
        # Node resolves the `tauri` arg as a file path — symlink the CLI entry point
        # so it is found from that working directory after npm ci runs.
        run: ln -sf ../node_modules/@tauri-apps/cli/tauri.js clients/desktop/src-tauri/tauri

      - name: Build Android APK
        run: ./node_modules/.bin/tauri android build --apk
        working-directory: clients/desktop
        env:
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.0.12077973

  # ── Mobile App: Tauri iOS Build ─────────────────────────────────────────────
  mobile-tauri-ios:
    name: Mobile iOS Build (Tauri)
    runs-on: macos-latest
    needs: [web-build]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust with iOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "clients/desktop/src-tauri -> target"

      - name: Check Rust compiles for iOS simulator
        # `tauri ios build` invokes xcodebuild which requires a signing team in
        # Xcode 14+, even for simulator targets.  Compiling the Rust crate directly
        # is sufficient to verify iOS compatibility in CI.
        run: cargo build --target aarch64-apple-ios-sim --manifest-path clients/desktop/src-tauri/Cargo.toml

  # ── E2E Tests ──────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    # Depends on test for two reasons: (1) no point running E2E if unit tests
    # fail, and (2) we reuse the compiled server binary from that job.
    needs: [test]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: together
          POSTGRES_PASSWORD: together_dev_password
          POSTGRES_DB: together_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "server -> target"

      - name: Cache sqlx-cli
        id: cache-sqlx
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/sqlx
          key: sqlx-cli-v0.8-${{ runner.os }}

      - name: Install sqlx-cli
        if: steps.cache-sqlx.outputs.cache-hit != 'true'
        run: |
          cargo install sqlx-cli \
            --no-default-features \
            --features postgres,native-tls \
            --locked

      - name: Run database migrations
        run: sqlx migrate run
        working-directory: server
        env:
          DATABASE_URL: postgresql://together:together_dev_password@localhost:5432/together_dev
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: clients/web/package-lock.json
      - name: Install dependencies
        run: npm ci --prefix clients/web
      - name: Install Playwright browsers
        run: cd clients/web && npx playwright install --with-deps chromium
      - name: Download server binary
        uses: actions/download-artifact@v4
        with:
          name: server-binary
          path: server/target/debug
      - name: Make server binary executable
        run: chmod +x server/target/debug/together-server
      - name: Run E2E tests
        run: npm run test:e2e --prefix clients/web
        env:
          DATABASE_URL: postgresql://together:together_dev_password@localhost:5432/together_dev
          CI: true
